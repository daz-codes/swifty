name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - name: Verify tag matches package version
        run: >-
          node --input-type=module --eval
          "import pkg from './package.json' with { type: 'json' };
          if (process.env.GITHUB_REF_NAME !== 'v' + pkg.version) process.exit(1)"
      - run: npm run check
      - id: pack
        name: Pack release
        run: echo "filename=$(npm pack --silent)" >> "$GITHUB_OUTPUT"
      - name: Publish to npm
        run: npm publish "${{ steps.pack.outputs.filename }}" --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Create GitHub release
        run: gh release create "$GITHUB_REF_NAME" "${{ steps.pack.outputs.filename }}" --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
